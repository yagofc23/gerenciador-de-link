<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Link</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div class="glass-container" style="max-width: 500px; text-align: center;">
        
        <div class="top-bar" style="justify-content: flex-end;">
            <button onclick="toggleTheme()" class="theme-toggle" title="Mudar Tema">
                <span id="theme-icon" class="material-icons">dark_mode</span>
            </button>
        </div>

        <h2 style="color: var(--title-color);">EDITAR LINK ✏️</h2>

        <form action="{{ url_for('editar_link', id_do_link=link.id) }}" method="POST" class="admin-panel" style="border: none; padding: 0;">
            
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="font-weight: bold; color: var(--text-main);">Título</label>
                <input type="text" name="titulo_html" value="{{ link.titulo }}" required>
            </div>

            <div style="text-align: left; margin-bottom: 15px;">
                <label style="font-weight: bold; color: var(--text-main);">URL</label>
                <input type="url" name="url_html" value="{{ link.url }}" required>
            </div>

            <div style="text-align: left; margin-bottom: 15px;">
                <label style="font-weight: bold; color: var(--text-main);">Categoria</label>
                <select name="categoria_html" required>
                    <option value="Estudos" {% if link.categoria == 'Estudos' %}selected{% endif %}>📚 Estudos</option>
                    <option value="Animes" {% if link.categoria == 'Animes' %}selected{% endif %}>🔥 Animes</option>
                    <option value="Trabalho" {% if link.categoria == 'Trabalho' %}selected{% endif %}>⚡ Trabalho</option>
                    <option value="Outros" {% if link.categoria == 'Outros' %}selected{% endif %}>🗿 Outros</option>
                </select>
            </div>

            <div style="text-align: left; margin-bottom: 25px;">
                <label style="display: flex; align-items: center; cursor: pointer; color: var(--text-main); font-weight: bold; font-size: 0.9rem;">
                    <input type="checkbox" name="publico_html" {% if link.publico %}checked{% endif %} style="width: auto; margin-right: 10px;">
                    Mostrar no Perfil Público? 🌎
                </label>
            </div>

            <button type="submit">Salvar Alterações</button>
            <a href="{{ url_for('pagina_inicial') }}" style="display: block; margin-top: 15px; color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">
                Cancelar
            </a>
        </form>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                icon.textContent = 'light_mode';
                localStorage.setItem('theme', 'dark');
            } else {
                icon.textContent = 'dark_mode';
                localStorage.setItem('theme', 'light');
            }
        }

        window.onload = function() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-icon').textContent = 'light_mode';
            }
        }
    </script>

</body>
</html>
