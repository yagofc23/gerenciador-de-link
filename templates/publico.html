<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Links de Yago</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div class="glass-container" style="padding-top: 50px;">
        
        <div style="position: absolute; top: 20px; right: 20px;">
            <button onclick="toggleTheme()" class="theme-toggle" title="Mudar Tema"><span id="theme-icon" class="material-icons">dark_mode</span></button>
        </div>

        <div style="text-align: center; margin-bottom: 40px;">
            
            {% if dono and dono.foto_perfil %}
                <img src="{{ url_for('static', filename='uploads/' + dono.foto_perfil) }}" 
                     style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--title-color); margin: 0 auto 15px auto; display: block; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            {% else %}
                <div style="width: 80px; height: 80px; background: var(--title-color); border-radius: 50%; margin: 0 auto 15px auto; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                    👤
                </div>
            {% endif %}

            <h1 class="main-title" style="font-size: 2rem;">YAGO COSTA</h1>
            <h2 class="subtitle">Desenvolvedor Full Stack & Analista de Sistemas</h2>
        </div>

        <ul>
            {% for link in links %}
                <li>
                    <span class="cat-badge cat-{{ link.categoria.lower() }}">{{ link.categoria }}</span>
                    
                    <a href="{{ url_for('ir_para_link', id_do_link=link.id) }}" target="_blank" style="text-decoration: none;">
                        <img src="https://www.google.com/s2/favicons?sz=64&domain_url={{ link.url }}" class="site-logo" alt="logo" onerror="this.style.display='none'">
                    </a>
                    
                    <a href="{{ url_for('ir_para_link', id_do_link=link.id) }}" target="_blank" class="link-title" style="font-size: 1rem;">
                        {{ link.titulo }}
                    </a>
                </li>
            {% else %}
                <p style="text-align: center; color: var(--text-secondary);">Este usuário ainda não publicou links.</p>
            {% endfor %}
        </ul>
        
        <div style="text-align: center; margin-top: 50px; opacity: 0.5; font-size: 0.8rem;">
            Feito com Python & Flask 🐍
        </div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            document.getElementById('theme-icon').textContent = document.body.classList.contains('dark-mode') ? 'light_mode' : 'dark_mode';
        }
        window.onload = function() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-icon').textContent = 'light_mode';
            }
        }
    </script>
</body>
</html>
